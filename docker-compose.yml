version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: unlitimate-transpo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unlitimate_transpo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: unlitimate-transpo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
